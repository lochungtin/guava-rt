name: Branch CI

on:
  push:
    branches:
      - main
      - master

concurrency:
  group: branch-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write

jobs:
  # ── Guard: skip if this push is the bot's own bump commit ─────────────
  guard:
    name: Guard – skip bot commits
    runs-on: ubuntu-latest
    outputs:
      is_bot: ${{ steps.check.outputs.is_bot }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect bot committer
        id: check
        run: |
          COMMITTER=$(git log -1 --pretty=format:'%ae')
          echo "Committer email: $COMMITTER"
          if [[ "$COMMITTER" == "github-actions[bot]@users.noreply.github.com" ]]; then
            echo "is_bot=true"  >> "$GITHUB_OUTPUT"
          else
            echo "is_bot=false" >> "$GITHUB_OUTPUT"
          fi

  # ── 1. Lint commits ───────────────────────────────────────────────────
  commitizen-check:
    name: Lint Commits (Commitizen)
    runs-on: ubuntu-latest
    needs: guard
    if: needs.guard.outputs.is_bot == 'false'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - run: pip install commitizen

      - name: Check commit messages
        run: cz check --rev-range origin/HEAD..HEAD || true

  # ── 2. Build ──────────────────────────────────────────────────────────
  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    needs: commitizen-check
    if: needs.guard.outputs.is_bot == 'false'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - run: pip install build commitizen

      - name: Build sdist & wheel
        run: python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ── 3. Publish to TestPyPI ────────────────────────────────────────────
  publish-testpypi:
    name: Publish → TestPyPI
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: testpypi
      url: https://test.pypi.org/project/guava-rt/
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  # ── 4. Bump version + push tag ────────────────────────────────────────
  auto-bump:
    name: Auto Bump Version & Changelog
    runs-on: ubuntu-latest
    needs: publish-testpypi
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Fetch all tags
        run: git fetch --tags --force

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - run: pip install commitizen

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version and update CHANGELOG
        run: |
          cz bump --yes

          # Capture the tag BEFORE amending — cz bump tags the current HEAD,
          # and amending rewrites the SHA, orphaning the tag from git describe.
          TAG=$(git tag --sort=-version:refname | head -n1)
          echo "NEW_TAG=$TAG" >> "$GITHUB_ENV"

          cz changelog
          git add CHANGELOG.md
          git commit --amend --no-edit

          # Re-point the tag at the amended HEAD so branch and tag are in sync.
          git tag -f "$TAG" HEAD

      - name: Push branch commit
        # Separate push so this retriggers branch-ci.yml, where guard detects
        # the bot committer and skips all downstream jobs cleanly.
        run: git push origin HEAD

      - name: Push tag separately
        # Separate push so GitHub fires release.yml as its own workflow run.
        # Using --follow-tags or a combined push only triggers one run (branch),
        # causing release.yml to be silently skipped.
        run: git push origin "$NEW_TAG"