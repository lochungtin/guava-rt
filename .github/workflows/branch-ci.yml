name: Branch CI

on:
  push:
    branches:
      - main
      - master

concurrency:
  group: branch-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write

jobs:
  # ── Guard: skip if this push is the bot's own bump commit ─────────────
  guard:
    name: Guard – skip bot commits
    runs-on: ubuntu-latest
    outputs:
      is_bot: ${{ steps.check.outputs.is_bot }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect bot committer
        id: check
        run: |
          COMMITTER=$(git log -1 --pretty=format:'%ae')
          echo "Committer email: $COMMITTER"
          if [[ "$COMMITTER" == "github-actions[bot]@users.noreply.github.com" ]]; then
            echo "is_bot=true"  >> "$GITHUB_OUTPUT"
          else
            echo "is_bot=false" >> "$GITHUB_OUTPUT"
          fi

  # ── 1. Lint commits ───────────────────────────────────────────────────
  commitizen-check:
    name: Lint Commits (Commitizen)
    runs-on: ubuntu-latest
    needs: guard
    if: needs.guard.outputs.is_bot == 'false'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - run: pip install commitizen

      - name: Check commit messages
        run: cz check --rev-range origin/HEAD..HEAD || true

  # ── 2. Build ──────────────────────────────────────────────────────────
  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    needs: commitizen-check
    if: needs.guard.outputs.is_bot == 'false'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - run: pip install build commitizen

      - name: Build sdist & wheel
        run: python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ── 3. Publish to TestPyPI ────────────────────────────────────────────
  publish-testpypi:
    name: Publish → TestPyPI
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: testpypi
      url: https://test.pypi.org/project/guava-rt/
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  # ── 4. Bump version + push tag ────────────────────────────────────────
  auto-bump:
    name: Auto Bump Version & Changelog
    runs-on: ubuntu-latest
    needs: publish-testpypi
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Fetch all tags
        run: git fetch --tags --force

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - run: pip install commitizen

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        run: |
          # Let cz bump do exactly one thing: update version files, commit,
          # and create the tag. No changelog here — that comes next as a
          # separate commit so we never need to amend (which caused .post0).
          cz bump --yes

          # Store the new tag for the push steps below.
          TAG=$(git tag --sort=-version:refname | head -n1)
          echo "NEW_TAG=$TAG" >> "$GITHUB_ENV"

      - name: Update CHANGELOG
        run: |
          cz changelog
          git add CHANGELOG.md
          # Only commit if there are staged changes (first release has no diff).
          git diff --cached --quiet || git commit -m "docs: update CHANGELOG for $NEW_TAG [skip ci]"

      - name: Push branch commits
        # Pushes the bump commit + the changelog commit (if any).
        # Retriggers branch-ci.yml but guard skips it — the [skip ci] tag
        # on the changelog commit also suppresses any stray runs.
        run: git push origin HEAD

      - name: Push tag separately
        # Separate push so GitHub fires release.yml as its own workflow run.
        run: git push origin "$NEW_TAG"