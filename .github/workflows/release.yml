name: Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*.*.*"

# Cancel any in-progress run on the same ref so rapid pushes don't queue.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # GUARD — exit immediately if this push was made by the bot's cz bump.
  # This breaks the cycle: bot pushes bump commit → branch trigger fires
  # → guard detects bot committer → all downstream jobs are skipped.
  # The tag pushed alongside the bump commit fires its own separate
  # tag-triggered run which goes straight to publish-pypi.
  # ─────────────────────────────────────────────────────────────────────
  guard:
    name: Skip bot bump commits
    runs-on: ubuntu-latest
    outputs:
      is_bot: ${{ steps.check.outputs.is_bot }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if commit is from the release bot
        id: check
        run: |
          COMMITTER=$(git log -1 --pretty=format:'%ae')
          echo "Committer: $COMMITTER"
          if [[ "$COMMITTER" == "github-actions[bot]@users.noreply.github.com" ]]; then
            echo "is_bot=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_bot=false" >> "$GITHUB_OUTPUT"
          fi

  # ─────────────────────────────────────────────
  # 1. Lint & validate commit messages (all runs)
  # ─────────────────────────────────────────────
  commitizen-check:
    name: Lint Commits (Commitizen)
    runs-on: ubuntu-latest
    needs: guard
    if: needs.guard.outputs.is_bot == 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history needed by cz

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Commitizen
        run: pip install commitizen

      - name: Check commit messages
        run: cz check --rev-range origin/HEAD..HEAD || true
        # `|| true` keeps CI green on merge commits / initial commits;
        # tighten to `cz check --rev-range origin/HEAD..HEAD` once your
        # team is fully on conventional commits.

  # ─────────────────────────────────────────────
  # 2. Build the distribution (all runs)
  # ─────────────────────────────────────────────
  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    needs: [guard, commitizen-check]
    if: needs.guard.outputs.is_bot == 'false'
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install build tools
        run: pip install build commitizen

      - name: Get current version
        id: get_version
        run: echo "version=$(cz version --project)" >> "$GITHUB_OUTPUT"

      - name: Build sdist & wheel
        run: python -m build

      - name: Upload dist artefacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ─────────────────────────────────────────────
  # 3. Publish to TestPyPI  (branch pushes only)
  # ─────────────────────────────────────────────
  publish-testpypi:
    name: Publish → TestPyPI
    runs-on: ubuntu-latest
    needs: build
    if: github.ref_type == 'branch'
    environment:
      name: testpypi
      url: https://test.pypi.org/project/guava-rt/
    steps:
      - name: Download dist artefacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true     # keeps re-runs idempotent

  # ─────────────────────────────────────────────
  # 4. Bump version + changelog  (branch pushes)
  #    Commitizen commits the bump and pushes a
  #    new vX.Y.Z tag, which triggers job 5.
  # ─────────────────────────────────────────────
  auto-bump:
    name: Auto Bump Version & Changelog
    runs-on: ubuntu-latest
    needs: publish-testpypi
    if: github.ref_type == 'branch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}   # PAT with repo + workflow scope

      # fetch-depth: 0 fetches commits but tags are not always synced —
      # fetch them explicitly so cz bump can find the previous tag.
      - name: Fetch all tags
        run: git fetch --tags --force

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Commitizen
        run: pip install commitizen

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version, update CHANGELOG, push tag
        run: |
          cz bump --yes
          cz changelog
          git add CHANGELOG.md
          git commit --amend --no-edit
          git push --follow-tags
        # `cz bump` reads conventional commits since the last tag,
        # increments semver accordingly, creates the new vX.Y.Z tag.
        # `cz changelog` regenerates the full CHANGELOG.md cleanly and
        # is amended into the bump commit before pushing.
        #
        # The branch push of this commit will retrigger the workflow,
        # but the `guard` job will detect the bot committer and skip
        # all downstream jobs. Only the tag push proceeds to publish-pypi.

  # ─────────────────────────────────────────────
  # 5. Publish to PyPI + GitHub Release  (tags)
  # ─────────────────────────────────────────────
  publish-pypi:
    name: Publish → PyPI & GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref_type == 'tag' && startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/project/guava-rt/
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download dist artefacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Extract changelog for this release
        id: changelog
        run: |
          # Pull the block between the two most recent "## v" headings
          NOTES=$(awk '/^## /{found++} found==1{print} found==2{exit}' CHANGELOG.md)
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES"    >> "$GITHUB_OUTPUT"
          echo "EOF"        >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          files: dist/*