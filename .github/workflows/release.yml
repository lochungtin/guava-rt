name: CI + Release + Publish

on: push

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.bump.outputs.version }}

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # REQUIRED for commitizen

      - name: Fetch main branch
        run: git fetch origin ${{ github.event.repository.default_branch }} --depth=1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build commitizen

      # ✅ Enforce commit message format
      - name: Check commit messages
        if: "!contains(github.event.head_commit.message, '[skip ci]')"
        run: |
          RANGE="origin/${{ github.event.repository.default_branch }}..HEAD"
          
          COUNT=$(git rev-list --count $RANGE || echo 0)

          if [ "$COUNT" -eq "0" ]; then
            echo "No commits to check."
          else
            cz check --rev-range $RANGE
          fi

      - name: Validate commit messages
        uses: wagoid/commitlint-github-action@v6

      # ✅ Bump version + generate changelog
      - name: Bump version and generate changelog
        id: bump
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          cz bump --yes --changelog
          echo "version=$(cz version -p)" >> $GITHUB_OUTPUT

      # ✅ Commit updated files (CHANGELOG + version)
      - name: Commit version bump
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "chore(release): bump version [skip ci]" || echo "No changes to commit"

      # ✅ Push commit + tags (created by commitizen)
      - name: Push changes
        run: |
          git push origin HEAD:main
          git push origin --tags

      # ✅ Build package AFTER version bump
      - name: Build package
        run: python -m build

      - name: Store artifacts
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest

    permissions:
      id-token: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest

    # ✅ ONLY run if this push included a tag (created by CI)
    if: contains(github.ref, 'refs/tags/')

    environment:
      name: pypi
      url: https://pypi.org/project/guava-rt/

    permissions:
      id-token: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1